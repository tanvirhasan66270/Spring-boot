<header class="header">
  <!-- Left spacer -->
  <div class="header-left"></div>

  <!-- Right actions -->
  <div class="header-actions">
    <!-- Time -->
    <div class="header-time">
      <i class="bi bi-clock"></i>
      <span>{{ currentDateTime }}</span>
    </div>

    <!-- Notifications -->
    <button class="header-icon-btn" routerLink="/notifications" title="Notifications">
      <i class="bi bi-bell"></i>
      <span *ngIf="unreadNotificationCount > 0" class="notification-badge">{{
        unreadNotificationCount
      }}</span>
    </button>

    <!-- Messages -->
    <button class="header-icon-btn" routerLink="/messages" title="Messages">
      <i class="bi bi-chat-dots"></i>
    </button>

    <!-- Profile Dropdown -->
    <div class="profile-container">
      <button class="profile-trigger" (click)="toggleDropdown()">
        <div class="avatar">
          <span>{{ getInitials() }}</span>
          <span class="avatar-status" [class.online]="onlineStatus"></span>
        </div>
        <div class="profile-meta">
          <span class="profile-name">{{ user?.name || 'SCM User' }}</span>
          <span class="profile-role">{{ user?.role || 'User' }}</span>
        </div>
        <i class="bi bi-chevron-down profile-chevron" [class.open]="showDropdown"></i>
      </button>

      <!-- Dropdown -->
      <div *ngIf="showDropdown" class="dropdown-backdrop" (click)="toggleDropdown()"></div>
      <div *ngIf="showDropdown" class="profile-dropdown">
        <div class="dropdown-header">
          <div class="avatar avatar-md">
            <span>{{ getInitials() }}</span>
          </div>
          <div>
            <div class="dropdown-name">{{ user?.name || 'SCM User' }}</div>
            <div class="dropdown-role">{{ user?.role }}</div>
          </div>
        </div>

        <div class="dropdown-divider"></div>

        <div class="dropdown-menu">
          <button class="dropdown-item" (click)="handleDropdownAction('View Profile')">
            <i class="bi bi-person"></i> View Profile
          </button>
          <button class="dropdown-item" (click)="handleDropdownAction('Edit Profile')">
            <i class="bi bi-pencil"></i> Edit Profile
          </button>
          <button class="dropdown-item" (click)="handleDropdownAction('reset-password')">
            <i class="bi bi-lock"></i> Change Password
          </button>
          <button class="dropdown-item" (click)="toggleTheme()">
            <i class="bi bi-palette"></i> Theme Toggle
          </button>
          <button class="dropdown-item" (click)="toggleOnlineStatus()">
            <i class="bi" [ngClass]="onlineStatus ? 'bi-toggle-on' : 'bi-toggle-off'"></i>
            {{ onlineStatus ? 'Online' : 'Offline' }}
          </button>
        </div>

        <div class="dropdown-divider"></div>

        <div class="dropdown-menu">
          <button
            class="dropdown-item dropdown-item-danger"
            (click)="handleDropdownAction('logout')"
          >
            <i class="bi bi-box-arrow-right"></i> Sign Out
          </button>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- Logout Modal -->
<div *ngIf="showLogoutModal" class="modal-backdrop" (click)="closeLogoutModal()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <div class="modal-icon">
      <i class="bi bi-box-arrow-right"></i>
    </div>
    <h3>Sign Out</h3>
    <p>Are you sure you want to end your session?</p>
    <div class="modal-actions">
      <button class="scm-btn scm-btn-secondary" (click)="closeLogoutModal()">Cancel</button>
      <button class="scm-btn scm-btn-danger" (click)="confirmLogout()">Sign Out</button>
    </div>
  </div>
</div>
