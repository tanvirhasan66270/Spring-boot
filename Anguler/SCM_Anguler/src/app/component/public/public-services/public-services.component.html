<div class="public-services py-5">
  <div class="container-fluid px-5">
    
    <div class="text-center mb-5">
      <h1 class="fw-extrabold text-dark tracking-tight mb-2">Our Solutions</h1>
      <p class="text-secondary">Comprehensive freight forwarding, customs clearance, and global sourcing services.</p>
    </div>

    <!-- Services Grid -->
    <div class="row g-4">
      <div class="col-md-6" *ngFor="let s of services">
        <div class="card border-0 shadow-sm p-4 bg-white rounded-4 h-100">
          <h4 class="fw-bold text-dark mb-2">{{ s.title }}</h4>
          <p class="text-secondary small mb-0">{{ s.desc }}</p>
        </div>
      </div>
    </div>

  </div>
</div>
