<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow border-0" style="width: 100%; max-width: 420px;">

    <div class="card-header bg-primary text-white text-center py-4">
      <i class="bi bi-shield-lock-fill fs-1 d-block mb-1"></i>
      <h5 class="fw-bold mb-0">Reset Password</h5>
      <small class="opacity-75">Choose a new password for your account</small>
    </div>

    <div class="card-body p-4">

      <!-- Success -->
      <div *ngIf="success" class="alert alert-success text-center">
        <i class="bi bi-check-circle-fill fs-3 d-block mb-2"></i>
        <strong>Password reset successful!</strong>
        <div class="small mt-1">Redirecting to login page...</div>
      </div>

      <!-- Error -->
      <div *ngIf="errorMessage && !success" class="alert alert-danger d-flex align-items-center gap-2">
        <i class="bi bi-exclamation-triangle-fill"></i><span>{{ errorMessage }}</span>
      </div>

      <form
        #rpForm="ngForm"
        (ngSubmit)="rpForm.valid && !mismatch && submit()"
        novalidate
        *ngIf="!success && token">

        <!-- New Password -->
        <div class="mb-3">
          <label class="form-label fw-semibold">New Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input
              [type]="showPassword ? 'text' : 'password'"
              class="form-control"
              [(ngModel)]="newPassword"
              name="newPassword"
              #pwRef="ngModel"
              required
              minlength="4"
              placeholder="At least 4 characters">
            <button class="btn btn-outline-secondary" type="button" (click)="showPassword = !showPassword">
              <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
            </button>
          </div>
          <div class="text-danger small mt-1" *ngIf="pwRef.invalid && pwRef.touched">
            Password must be at least 4 characters.
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-4">
          <label class="form-label fw-semibold">Confirm Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input
              [type]="showConfirm ? 'text' : 'password'"
              class="form-control"
              [class.is-invalid]="mismatch"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              required
              placeholder="Re-enter password">
            <button class="btn btn-outline-secondary" type="button" (click)="showConfirm = !showConfirm">
              <i class="bi" [ngClass]="showConfirm ? 'bi-eye-slash' : 'bi-eye'"></i>
            </button>
          </div>
          <div class="text-danger small mt-1" *ngIf="mismatch">
            Passwords do not match.
          </div>
        </div>

        <button
          class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2"
          type="submit"
          [disabled]="loading || mismatch">
          <span *ngIf="loading" class="spinner-border spinner-border-sm"></span>
          <i class="bi bi-check-circle-fill" *ngIf="!loading"></i>
          {{ loading ? 'Resetting...' : 'Reset Password' }}
        </button>

      </form>

      <div class="text-center mt-3" *ngIf="!success">
        <a routerLink="/forgot-password" class="small text-primary text-decoration-none">
          <i class="bi bi-arrow-left me-1"></i>Request a new link
        </a>
      </div>
    </div>
  </div>
</div>
