<app-header></app-header>
<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow border-0" style="width: 100%; max-width: 420px;">

    <!-- Header -->
    <div class="card-header bg-primary text-white text-center py-4">
      <i class="bi bi-box-seam fs-1 d-block mb-1"></i>
      <h5 class="fw-bold mb-0">SCM Management</h5>
      <small class="opacity-75">Sign in to your account</small>
    </div>

    <div class="card-body p-4">

      <!-- Error alert -->
      <div *ngIf="errorMessage" class="alert alert-danger d-flex align-items-center gap-2 py-2">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span>{{ errorMessage }}</span>
      </div>

      <form #loginForm="ngForm" (ngSubmit)="loginForm.valid && login()" novalidate>

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
            <input
              type="email"
              class="form-control"
              [(ngModel)]="dto.email"
              name="email"
              #emailRef="ngModel"
              required
              email
              placeholder="you@example.com">
          </div>
          <div class="text-danger small mt-1" *ngIf="emailRef.invalid && emailRef.touched">
            Enter a valid email.
          </div>
        </div>

        <!-- Password -->
        <div class="mb-4">
          <div class="d-flex justify-content-between">
            <label class="form-label fw-semibold">Password</label>
            <a href="forgot-password" class="small text-primary text-decoration-none">
              Forgot password?
            </a>
          </div>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input
              [type]="showPassword ? 'text' : 'password'"
              class="form-control"
              [(ngModel)]="dto.password"
              name="password"
              #passwordRef="ngModel"
              required
              placeholder="Your password">
            <button class="btn btn-outline-secondary" type="button" (click)="showPassword = !showPassword">
              <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
            </button>
          </div>
          <div class="text-danger small mt-1" *ngIf="passwordRef.invalid && passwordRef.touched">
            Password is required.
          </div>
        </div>

        <!-- Submit -->
        <button
          class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2"
          type="submit"
          [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm"></span>
          <i class="bi bi-box-arrow-in-right" *ngIf="!loading"></i>
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>

      </form>
    </div>
  </div>
</div>
