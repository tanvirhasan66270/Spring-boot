<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow border-0" style="width: 100%; max-width: 420px">
    <div class="card-header bg-primary text-white text-center py-4">
      <i class="bi bi-key-fill fs-1 d-block mb-1"></i>
      <h5 class="fw-bold mb-0">Forgot Password</h5>
      <small class="opacity-75">Enter your email to receive a reset link</small>
    </div>

    <div class="card-body p-4">
      <div *ngIf="successMessage" class="alert alert-success d-flex align-items-center gap-2">
        <i class="bi bi-check-circle-fill"></i><span>{{ successMessage }}</span>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger d-flex align-items-center gap-2">
        <i class="bi bi-exclamation-triangle-fill"></i><span>{{ errorMessage }}</span>
      </div>

      <form
        #fpForm="ngForm"
        (ngSubmit)="fpForm.valid && submit()"
        novalidate
        *ngIf="!successMessage"
      >
        <div class="mb-4">
          <label class="form-label fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
            <input
              type="email"
              class="form-control"
              [(ngModel)]="email"
              name="email"
              #emailRef="ngModel"
              required
              email
              placeholder="you@example.com"
            />
          </div>
          <div class="text-danger small mt-1" *ngIf="emailRef.invalid && emailRef.touched">
            Enter a valid email.
          </div>
        </div>

        <button
          class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2"
          type="submit"
          [disabled]="loading"
        >
          <span *ngIf="loading" class="spinner-border spinner-border-sm"></span>
          <i class="bi bi-send-fill" *ngIf="!loading"></i>
          {{ loading ? 'Sending...' : 'Send Reset Link' }}
        </button>
      </form>

      <div class="text-center mt-3">
        <a routerLink="/login" class="small text-primary text-decoration-none">
          <i class="bi bi-arrow-left me-1"></i>Back to Login
        </a>
      </div>
    </div>
  </div>
</div>
