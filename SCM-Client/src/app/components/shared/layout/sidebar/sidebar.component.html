<div class="bg-dark text-white vh-100 p-3 flex-shrink-0" style="width: 260px;">
  <div class="d-flex align-items-center mb-4 pb-2 border-bottom border-secondary">
    <i class="bi bi-cpu fs-4 me-2 text-primary"></i>
    <span class="fs-5 fw-bold font-monospace">SCM Console</span>
  </div>
  
  <ul class="nav nav-pills flex-column mb-auto">
    <!-- Admin/Manager Links -->
    <ng-container *ngIf="role === 'ADMIN' || role === 'MANAGER'">
      <li class="nav-item mb-2">
        <a routerLink="/feature/agents" routerLinkActive="active" class="nav-link text-white d-flex align-items-center">
          <i class="bi bi-people me-3 fs-5"></i> Manage Agents
        </a>
      </li>
      <li class="nav-item mb-2">
        <a routerLink="/feature/customer" routerLinkActive="active" class="nav-link text-white d-flex align-items-center">
          <i class="bi bi-person-lines-fill me-3 fs-5"></i> Customers
        </a>
      </li>
      <li class="nav-item mb-2">
        <a routerLink="/feature/riders" routerLinkActive="active" class="nav-link text-white d-flex align-items-center">
          <i class="bi bi-truck me-3 fs-5"></i> Drivers / Riders
        </a>
      </li>
      <li class="nav-item mb-2">
        <a routerLink="/feature/address" routerLinkActive="active" class="nav-link text-white d-flex align-items-center">
          <i class="bi bi-geo-alt me-3 fs-5"></i> Node Directory
        </a>
      </li>
    </ng-container>

    <!-- Customer Links -->
    <ng-container *ngIf="role === 'CUSTOMER'">
      <li class="nav-item mb-2">
        <a routerLink="/feature/customer" routerLinkActive="active" class="nav-link text-white d-flex align-items-center">
          <i class="bi bi-cart me-3 fs-5"></i> My Orders
        </a>
      </li>
    </ng-container>

    <!-- Driver Links -->
    <ng-container *ngIf="role === 'DRIVER'">
      <li class="nav-item mb-2">
        <a routerLink="/feature/riders" routerLinkActive="active" class="nav-link text-white d-flex align-items-center">
          <i class="bi bi-map me-3 fs-5"></i> Trip Sheets
        </a>
      </li>
    </ng-container>

    <li class="nav-item mt-4 border-top border-secondary pt-3">
      <a routerLink="/home" class="nav-link text-light opacity-75 d-flex align-items-center">
        <i class="bi bi-house me-3 fs-5"></i> Public Site
      </a>
    </li>
  </ul>
</div>
