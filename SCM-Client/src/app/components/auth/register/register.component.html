<div class="container py-5 my-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
        <div class="p-5 bg-white">
          <div class="text-center mb-4">
            <h2 class="text-dark fw-bold mb-1">SCM Account Registration</h2>
            <p class="text-muted">Register your portal node and load geography configurations dynamically.</p>
          </div>

          <div *ngIf="errorMessage" class="alert alert-danger border-0 rounded-3 mb-4">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            {{ errorMessage }}
          </div>

          <div *ngIf="message" class="alert alert-success border-0 rounded-3 mb-4">
            <i class="bi bi-check-circle-fill me-2"></i>
            {{ message }}
          </div>

          <form *ngIf="!success" (ngSubmit)="onSubmit()" #regForm="ngForm">
            <!-- Account Info Row -->
            <div class="row g-3 mb-4">
              <h5 class="fw-bold border-bottom pb-2 text-primary"><i class="bi bi-person me-2"></i> Account Details</h5>
              
              <div class="col-md-6">
                <label for="role" class="form-label text-secondary fw-semibold">Register As</label>
                <select class="form-select py-2 px-3 rounded-3" id="role" name="role" [(ngModel)]="form.role">
                  <option value="CUSTOMER">Customer Node</option>
                  <option value="SUPPLIER">Supplier Merchant</option>
                  <option value="DRIVER">Delivery Rider / Driver</option>
                </select>
              </div>

              <div class="col-md-6">
                <label for="name" class="form-label text-secondary fw-semibold">Full Name</label>
                <input type="text" class="form-control py-2 px-3 rounded-3" id="name" name="name" [(ngModel)]="form.name" required placeholder="Enter full name">
              </div>

              <div class="col-md-6">
                <label for="email" class="form-label text-secondary fw-semibold">Email Address</label>
                <input type="email" class="form-control py-2 px-3 rounded-3" id="email" name="email" [(ngModel)]="form.email" required email placeholder="email@example.com">
              </div>

              <div class="col-md-6">
                <label for="phone" class="form-label text-secondary fw-semibold">Phone Number</label>
                <div class="input-group">
                  <span class="input-group-text bg-light text-secondary font-monospace fw-semibold py-2 px-3 rounded-start-3" id="phone-addon">
                    {{ selectedPhoneCode || '+Code' }}
                  </span>
                  <input 
                    type="text" 
                    class="form-control py-2.5 px-3 rounded-end-3" 
                    id="phone" 
                    name="phone" 
                    [(ngModel)]="form.phone" 
                    required 
                    placeholder="1712345678"
                    aria-describedby="phone-addon">
                </div>
              </div>

              <div class="col-md-6">
                <label for="password" class="form-label text-secondary fw-semibold">Security Password</label>
                <input type="password" class="form-control py-2 px-3 rounded-3" id="password" name="password" [(ngModel)]="form.password" required minlength="4" placeholder="••••••••">
              </div>

              <div class="col-md-6">
                <label for="gender" class="form-label text-secondary fw-semibold">Gender</label>
                <select class="form-select py-2 px-3 rounded-3" id="gender" name="gender" [(ngModel)]="form.gender">
                  <option value="MALE">Male</option>
                  <option value="FEMALE">Female</option>
                  <option value="OTHERS">Others</option>
                </select>
              </div>

              <div class="col-md-6">
                <label for="dob" class="form-label text-secondary fw-semibold">Date of Birth</label>
                <input type="date" class="form-control py-2 px-3 rounded-3" id="dob" name="dob" [(ngModel)]="form.dob" required>
              </div>

              <div class="col-md-6">
                <label for="nidNumber" class="form-label text-secondary fw-semibold">National ID (NID)</label>
                <input type="text" class="form-control py-2 px-3 rounded-3" id="nidNumber" name="nidNumber" [(ngModel)]="form.nidNumber" required placeholder="NID Card Number">
              </div>
            </div>

            <!-- Role-Specific Details Row -->
            <div class="row g-3 mb-4" *ngIf="form.role === 'SUPPLIER' || form.role === 'DRIVER'">
              <h5 class="fw-bold border-bottom pb-2 text-info"><i class="bi bi-briefcase me-2"></i> Professional Credentials</h5>
              
              <!-- Supplier Spec -->
              <div class="col-md-12" *ngIf="form.role === 'SUPPLIER'">
                <label for="contactPerson" class="form-label text-secondary fw-semibold">Contact Person Name</label>
                <input type="text" class="form-control py-2 px-3 rounded-3" id="contactPerson" name="contactPerson" [(ngModel)]="form.contactPerson" required placeholder="Alternative contact representative">
              </div>

              <!-- Driver Spec -->
              <ng-container *ngIf="form.role === 'DRIVER'">
                <div class="col-md-6">
                  <label for="vehicleType" class="form-label text-secondary fw-semibold">Vehicle Category</label>
                  <select class="form-select py-2 px-3 rounded-3" id="vehicleType" name="vehicleType" [(ngModel)]="form.vehicleType">
                    <option value="TRUCK">Heavy Duty Truck</option>
                    <option value="VAN">Light Cargo Van</option>
                    <option value="BIKE">Motorcycle Rider</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label for="vehicleNumber" class="form-label text-secondary fw-semibold">Vehicle Plate Number</label>
                  <input type="text" class="form-control py-2 px-3 rounded-3" id="vehicleNumber" name="vehicleNumber" [(ngModel)]="form.vehicleNumber" required placeholder="Metro-T-1234">
                </div>
              </ng-container>
            </div>

            <!-- Geography / Address cascading lookup -->
            <div class="row g-3 mb-4">
              <h5 class="fw-bold border-bottom pb-2 text-danger"><i class="bi bi-geo-alt me-2"></i> Geography / Node Address</h5>
              
              <div class="col-md-6">
                <label for="country" class="form-label text-secondary fw-semibold">Select Country</label>
                <select class="form-select py-2 px-3 rounded-3" id="country" name="countryId" [(ngModel)]="form.countryId" (change)="onCountryChange()" required>
                  <option [ngValue]="null" disabled>Choose Country...</option>
                  <option *ngFor="let country of countries" [value]="country.id">{{ country.name }}</option>
                </select>
              </div>

              <div class="col-md-6">
                <label for="division" class="form-label text-secondary fw-semibold">Select Division</label>
                <select class="form-select py-2 px-3 rounded-3" id="division" name="divisionId" [(ngModel)]="form.divisionId" (change)="onDivisionChange()" [disabled]="!form.countryId" required>
                  <option [ngValue]="null" disabled>Choose Division...</option>
                  <option *ngFor="let div of divisions" [value]="div.id">{{ div.name }} ({{ div.nameBn }})</option>
                </select>
              </div>

              <div class="col-md-6">
                <label for="district" class="form-label text-secondary fw-semibold">Select District</label>
                <select class="form-select py-2 px-3 rounded-3" id="district" name="districtId" [(ngModel)]="form.districtId" (change)="onDistrictChange()" [disabled]="!form.divisionId" required>
                  <option [ngValue]="null" disabled>Choose District...</option>
                  <option *ngFor="let dist of districts" [value]="dist.id">{{ dist.name }} ({{ dist.nameBn }})</option>
                </select>
              </div>

              <div class="col-md-6">
                <label for="policeStation" class="form-label text-secondary fw-semibold">Select Police Station / Postal Hub</label>
                <select class="form-select py-2 px-3 rounded-3" id="policeStation" name="policeStationId" [(ngModel)]="form.policeStationId" [disabled]="!form.districtId" required>
                  <option [ngValue]="null" disabled>Choose Station...</option>
                  <option *ngFor="let ps of policeStations" [value]="ps.id">{{ ps.name }} ({{ ps.nameBn }} - {{ ps.postalCode }})</option>
                </select>
              </div>

              <div class="col-12">
                <label for="address" class="form-label text-secondary fw-semibold">Street Address / Landmark</label>
                <textarea class="form-control py-2 px-3 rounded-3" id="address" name="address" [(ngModel)]="form.address" rows="2" required placeholder="House, Road, Apartment Details..."></textarea>
              </div>

              <div class="col-12">
                <label for="image" class="form-label text-secondary fw-semibold">Profile Photo</label>
                <input type="file" class="form-control py-2 px-3 rounded-3" id="image" (change)="onFileSelected($event)">
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-3 rounded-3 fw-bold shadow-sm d-flex justify-content-center align-items-center mb-3" [disabled]="regForm.invalid || loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              {{ loading ? 'Initializing Account Node...' : 'Register Account Node' }}
            </button>
          </form>

          <div class="text-center mt-4">
            <span class="text-muted">Already registered?</span>
            <a routerLink="/login" class="text-decoration-none text-primary fw-semibold ms-1">Sign In instead</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
