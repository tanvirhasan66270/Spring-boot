<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg border-0 rounded-4" style="max-width: 480px; width: 100%; overflow: hidden;">
    <div class="p-5 bg-white">
      <div class="text-center mb-4">
        <i class="bi bi-key text-danger" style="font-size: 3.5rem;"></i>
        <h3 class="mt-3 text-dark fw-bold">Forgot Password?</h3>
        <p class="text-muted">Enter your registered email and we'll send you a link to reset your password.</p>
      </div>

      <div *ngIf="message" class="alert border-0 rounded-3 mb-4" [ngClass]="success ? 'alert-success' : 'alert-danger'">
        <i class="bi me-2" [ngClass]="success ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill'"></i>
        {{ message }}
      </div>

      <form *ngIf="!success" (ngSubmit)="onSubmit()" #forgotForm="ngForm">
        <div class="mb-4">
          <label for="email" class="form-label text-secondary fw-semibold">Email Address</label>
          <input 
            type="email" 
            class="form-control py-2.5 px-3 rounded-3" 
            id="email" 
            name="email" 
            [(ngModel)]="email" 
            required 
            email 
            #emailInput="ngModel"
            placeholder="name@example.com"
            [class.is-invalid]="emailInput.invalid && emailInput.touched">
          <div class="invalid-feedback">
            Please enter a valid email address.
          </div>
        </div>

        <button 
          type="submit" 
          class="btn btn-danger w-100 py-2.5 rounded-3 fw-bold shadow-sm d-flex justify-content-center align-items-center" 
          [disabled]="forgotForm.invalid || loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          {{ loading ? 'Sending link...' : 'Send Reset Link' }}
        </button>
      </form>

      <div class="text-center mt-4">
        <a routerLink="/login" class="text-decoration-none text-primary fw-semibold">
          <i class="bi bi-arrow-left me-1"></i> Back to Login
        </a>
      </div>
    </div>
  </div>
</div>
