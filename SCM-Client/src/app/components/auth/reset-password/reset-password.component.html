<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg border-0 rounded-4" style="max-width: 480px; width: 100%; overflow: hidden;">
    <div class="p-5 bg-white">
      <div class="text-center mb-4">
        <i class="bi bi-shield-lock text-warning" style="font-size: 3.5rem;"></i>
        <h3 class="mt-3 text-dark fw-bold">Reset Password</h3>
        <p class="text-muted">Enter your new secure password below to update your account credentials.</p>
      </div>

      <div *ngIf="message" class="alert border-0 rounded-3 mb-4" [ngClass]="success ? 'alert-success' : 'alert-danger'">
        <i class="bi me-2" [ngClass]="success ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill'"></i>
        {{ message }}
      </div>

      <form *ngIf="!success && token" (ngSubmit)="onSubmit()" #resetForm="ngForm">
        <div class="mb-3">
          <label for="newPassword" class="form-label text-secondary fw-semibold">New Password</label>
          <input 
            type="password" 
            class="form-control py-2.5 px-3 rounded-3" 
            id="newPassword" 
            name="newPassword" 
            [(ngModel)]="newPassword" 
            required 
            minlength="4"
            #pwInput="ngModel"
            placeholder="Min 4 characters"
            [class.is-invalid]="pwInput.invalid && pwInput.touched">
          <div class="invalid-feedback">
            Password must be at least 4 characters long.
          </div>
        </div>

        <div class="mb-4">
          <label for="confirmPassword" class="form-label text-secondary fw-semibold">Confirm Password</label>
          <input 
            type="password" 
            class="form-control py-2.5 px-3 rounded-3" 
            id="confirmPassword" 
            name="confirmPassword" 
            [(ngModel)]="confirmPassword" 
            required
            #confirmInput="ngModel"
            placeholder="Confirm password"
            [class.is-invalid]="(newPassword !== confirmPassword) && confirmInput.touched">
          <div class="invalid-feedback">
            Passwords do not match.
          </div>
        </div>

        <button 
          type="submit" 
          class="btn btn-warning text-dark w-100 py-2.5 rounded-3 fw-bold shadow-sm d-flex justify-content-center align-items-center" 
          [disabled]="resetForm.invalid || (newPassword !== confirmPassword) || loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          {{ loading ? 'Updating...' : 'Update Password' }}
        </button>
      </form>

      <div class="text-center mt-4">
        <a routerLink="/login" class="text-decoration-none text-primary fw-semibold">
          <i class="bi bi-arrow-left me-1"></i> Back to Login
        </a>
      </div>
    </div>
  </div>
</div>
