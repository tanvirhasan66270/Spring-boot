<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg border-0 rounded-4" style="max-width: 480px; width: 100%; overflow: hidden;">
    <div class="p-5 bg-white">
      <div class="text-center mb-4">
        <h2 class="text-dark fw-bold mb-1">SCM Portal</h2>
        <p class="text-muted">Enter your credentials to access the secure node.</p>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger border-0 rounded-3 mb-4">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        {{ errorMessage }}
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="mb-3">
          <label for="email" class="form-label text-secondary fw-semibold">Email Address</label>
          <input 
            type="email" 
            class="form-control py-2.5 px-3 rounded-3" 
            id="email" 
            name="email" 
            [(ngModel)]="form.email" 
            required 
            email
            #emailInput="ngModel"
            placeholder="email@example.com"
            [class.is-invalid]="emailInput.invalid && emailInput.touched">
          <div class="invalid-feedback">
            Please enter a valid email address.
          </div>
        </div>

        <div class="mb-4">
          <div class="d-flex justify-content-between mb-2">
            <label for="password" class="form-label text-secondary fw-semibold mb-0">Password</label>
            <a routerLink="/forgot-password" class="text-decoration-none text-primary small fw-semibold">Forgot Password?</a>
          </div>
          <input 
            type="password" 
            class="form-control py-2.5 px-3 rounded-3" 
            id="password" 
            name="password" 
            [(ngModel)]="form.password" 
            required
            #pwInput="ngModel"
            placeholder="••••••••"
            [class.is-invalid]="pwInput.invalid && pwInput.touched">
          <div class="invalid-feedback">
            Password is required.
          </div>
        </div>

        <button 
          type="submit" 
          class="btn btn-primary w-100 py-2.5 rounded-3 fw-bold shadow-sm d-flex justify-content-center align-items-center" 
          [disabled]="loginForm.invalid || loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>

      <div class="text-center mt-4">
        <span class="text-muted">New user?</span>
        <a routerLink="/register" class="text-decoration-none text-primary fw-semibold ms-1">Register Node</a>
      </div>
    </div>
  </div>
</div>
