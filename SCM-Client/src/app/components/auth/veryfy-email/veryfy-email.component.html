<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg border-0 rounded-4" style="max-width: 480px; width: 100%; overflow: hidden;">
    <div class="p-5 text-center bg-white">
      <div class="mb-4">
        <i class="bi bi-shield-check text-primary" style="font-size: 4rem;"></i>
      </div>
      
      <h3 class="mb-3 text-dark fw-bold">SCM Email Verification</h3>
      
      <div *ngIf="loading" class="my-4">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2 text-muted">Contacting security server...</p>
      </div>

      <div *ngIf="!loading">
        <div *ngIf="success" class="alert alert-success border-0 rounded-3 mb-4">
          <i class="bi bi-check-circle-fill me-2"></i>
          {{ message }}
        </div>

        <div *ngIf="!success" class="alert alert-danger border-0 rounded-3 mb-4">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          {{ message }}
        </div>

        <a routerLink="/login" class="btn btn-primary w-100 py-2.5 rounded-3 fw-bold">
          Go to Secure Login
        </a>
      </div>
    </div>
  </div>
</div>
